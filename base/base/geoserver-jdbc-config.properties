# geoserver-jdbc-config.properties
# Configuração do GeoServer para externalizar o Data Directory para o AWS RDS

# Conexão com o PostGIS (Variáveis resolvidas em runtime via Secrets)
jdbcUrl=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
username=${DB_USER}
password=${DB_PASS}
driverClassName=org.postgresql.Driver

# Tuning de Pool de Conexão para alta concorrência na Rede ANA
pool.minIdle=5
pool.maxActive=50
pool.poolPreparedStatements=true
pool.maxWait=10000
pool.validationQuery=SELECT 1

# O GeoServer criará as tabelas de configuração automaticamente na primeira subida
initdb=true
import=true
