# ========================================================================
# VALORES DE PRODUÇÃO - GEONODE ENTERPRISE (OPENSHIFT / DEVSECOPS)
# Arquitetura Cloud-Native com AWS RDS, S3, Analytics e IAM (SSO/LDAP)
# ========================================================================

global:
  imagePullSecrets:
    - name: quay-pull-secret

# ------------------------------------------------------------------------
# 1. CORE WEB & CATÁLOGO (Django / MapStore / IAM)
# ------------------------------------------------------------------------
django:
  replicaCount: 3
  image:
    repository: quay.io/ana-gov/geonode-django
    tag: "latest-commit-hash" 
    pullPolicy: Always

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
    fsGroup: 1001

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  env:
    # --- Banco de Dados Geográfico (AWS RDS Externo) ---
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: aws-rds-credentials
          key: django_db_url
    - name: GEODATABASE_URL
      valueFrom:
        secretKeyRef:
          name: aws-rds-credentials
          key: postgis_db_url

    # --- Storage Desacoplado (AWS S3) ---
    - name: DEFAULT_FILE_STORAGE
      value: "storages.backends.s3boto3.S3Boto3Storage"
    - name: STATICFILES_STORAGE
      value: "storages.backends.s3boto3.S3Boto3Storage"
    - name: AWS_STORAGE_BUCKET_NAME
      value: "ana-geonode-prod-bucket"
    - name: AWS_S3_REGION_NAME
      value: "sa-east-1"
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-s3-credentials
          key: access_key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-s3-credentials
          key: secret_key

    # --- CAMADA DE APLICAÇÃO E FRONT-END ---
    - name: GEONODE_CLIENT_LAYER_PREVIEW_LIBRARY
      value: "mapstore"
    - name: ENABLE_MAPSTORE_APPS
      value: "true"

    # --- Fila Assíncrona ---
    - name: CELERY_BROKER_URL
      value: "redis://geonode-redis-master:6379/0"

    # ====================================================================
    # GESTÃO DE IDENTIDADE E ACESSO (IAM)
    # Instrução: Descomente apenas O BLOCO A ou O BLOCO B conforme a
    # diretriz de rede corporativa vigente.
    # ====================================================================

    # --------------------------------------------------------------------
    # OPÇÃO A: Integração LDAP / Active Directory (On-Premise)
    # Ideal se a autenticação primária for o servidor AD interno da rede.
    # --------------------------------------------------------------------
    # - name: LDAP_ENABLED
    #   value: "True"
    # - name: LDAP_SERVER_URL
    #   value: "ldaps://ad.ana.gov.br:636"
    # - name: LDAP_BIND_DN
    #   value: "CN=Geonode Service,OU=Servicos,DC=ana,DC=gov,DC=br"
    # - name: LDAP_BIND_PASSWORD
    #   valueFrom:
    #     secretKeyRef:
    #       name: ad-credentials
    #       key: password
    # - name: LDAP_USER_SEARCH_DN
    #   value: "OU=Usuarios,DC=ana,DC=gov,DC=br"
    # - name: LDAP_USER_SEARCH_FILTER_STR
    #   value: "(sAMAccountName=%(user)s)"
    # - name: LDAP_GROUP_SEARCH_DN
    #   value: "OU=Grupos,DC=ana,DC=gov,DC=br"
    
    # --------------------------------------------------------------------
    # OPÇÃO B: Integração OIDC / SAML 2.0 (Cloud-Native SSO)
    # Ideal para Microsoft Entra ID (Azure AD), Keycloak ou Gov.br.
    # Esta é a opção recomendada para arquiteturas Zero Trust.
    # --------------------------------------------------------------------
    - name: OAUTH2_PROVIDER_APPLICATION_MODEL
      value: "oauth2_provider.Application"
    - name: SOCIALACCOUNT_PROVIDERS
      # Exemplo formatado para Azure AD (Ajustar o tenant e chaves no Secret em Produção)
      value: '{"openid_connect": {"APPS": [{"client_id": "geonode-oidc-client", "secret": "INJETAR_VIA_SECRET", "settings": {"server_url": "https://login.microsoftonline.com/tenant-id-da-agencia/v2.0"}}]}}'

# ------------------------------------------------------------------------
# 2. MOTOR DE MAPAS OGC (GeoServer)
# ------------------------------------------------------------------------
geoserver:
  replicaCount: 2
  image:
    repository: quay.io/ana-gov/geonode-geoserver
    tag: "latest-commit-hash"
    pullPolicy: Always

  securityContext:
    runAsNonRoot: true
    runAsUser: 1001

  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  env:
    - name: GEOSERVER_JDBC_CONFIG
      value: "true"
    - name: GEOSERVER_DATA_DIR
      value: "/opt/geoserver_data"
    - name: INITIAL_MEMORY
      value: "2G"
    - name: MAXIMUM_MEMORY
      value: "4G"

  volumeMounts:
    - name: jdbc-config-volume
      mountPath: /opt/geoserver_data/jdbcconfig/jdbcconfig.properties
      subPath: jdbcconfig.properties
  
  volumes:
    - name: jdbc-config-volume
      configMap:
        name: geoserver-jdbc-configmap

# ------------------------------------------------------------------------
# 3. CAMADA DE BUSINESS INTELLIGENCE AVANÇADA (Apache Superset)
# ------------------------------------------------------------------------
superset:
  enabled: true
  replicaCount: 1
  image:
    repository: quay.io/ana-gov/apache-superset
    tag: "latest"
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  env:
    - name: SUPERSET_SQLALCHEMY_URI
      valueFrom:
        secretKeyRef:
          name: aws-rds-credentials
          key: postgis_db_url_read_only
    - name: SUPERSET_FEATURE_EMBEDDED_SUPERSET
      value: "true"
    - name: SUPERSET_WEBSERVER_ADDRESS
      value: "0.0.0.0"

# ------------------------------------------------------------------------
# 4. CACHE E MENSAGERIA (Redis)
# ------------------------------------------------------------------------
redis:
  enabled: true
  replicaCount: 1
  image:
    repository: redis
    tag: 7.0-alpine
  securityContext:
    runAsUser: 1001

# ------------------------------------------------------------------------
# 5. ROTEAMENTO CORPORATIVO (OpenShift Routes)
# ------------------------------------------------------------------------
route:
  enabled: true
  hostGeoNode: "geonode.ana.gov.br"
  hostSuperset: "bi-espacial.ana.gov.br"
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
